<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <base href="/gpmd-chatbot/"/>
  <title>Dashboard — GPMD 2026</title>
  <link rel="icon" href="assets/img/favicon.png"/>
  <link rel="stylesheet" href="assets/css/main.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    .barlist { display:flex; flex-direction:column; gap:.55rem; }
    .barrow { font-size:.85rem; }
    .barrow .bl { display:flex; justify-content:space-between; margin-bottom:.2rem; }
    .bar { height:8px; border-radius:6px; background:var(--gray-bg); overflow:hidden; }
    .bar > span { display:block; height:100%; background:var(--sa-grad); }
    .cupo-bar { height:14px; border-radius:8px; background:var(--gray-bg); overflow:hidden; margin-top:.5rem; }
    .cupo-bar > span { display:block; height:100%; background:var(--sa-grad); }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="page-header"><div><h1>Dashboard</h1><p>Resumen del Gran Premio Mobil Delvac 2026</p></div>
      <button class="btn btn-secondary btn-sm" onclick="cargar()">↻ Actualizar</button></div>

    <div class="kpi-grid" id="kpis"></div>

    <div class="card card-pad" style="margin-bottom:1.25rem;">
      <div class="card-title">Cupo de confirmados</div>
      <div style="font-size:1.6rem;font-weight:800;" id="cupoTxt">0 / 150</div>
      <div class="cupo-bar"><span id="cupoBar" style="width:0%"></span></div>
      <div class="muted" style="font-size:.8rem;margin-top:.4rem;" id="cupoSub"></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;">
      <div class="card card-pad"><div class="card-title">Top clientes (PDV) con facturas</div><div class="barlist" id="clientes"></div></div>
      <div class="card card-pad"><div class="card-title">Causas de rechazo</div><div class="barlist" id="causas"></div></div>
    </div>
  </main>
</div>

<script src="assets/js/auth.js"></script>
<script>
const CAUSA_LABEL = { foto_ilegible:'Foto/factura ilegible', fuera_periodo:'Fuera de fechas', producto_no_participante:'Producto no participante', establecimiento_no_participante:'Establecimiento no participante', factura_duplicada:'Factura duplicada', valor_insuficiente:'Valor insuficiente', otro:'Otro' };

async function init(){ requireRole(['admin','cliente']); renderSidebar('dashboard'); await cargar(); }

async function cargar(){
  const res = await apiFetch('api/dashboard'); if(!res) return;
  const d = await res.json();
  const e = d.por_estado;
  document.getElementById('kpis').innerHTML = [
    kpi('Total preregistrados', d.total_participantes, 'grad'),
    kpi('Confirmados', e.confirmado, 'verde'),
    kpi('En revisión', e.en_revision, 'amber'),
    kpi('Pre registrados', e.pre_registrado, 'purple'),
    kpi('Rechazados', e.rechazado, 'red'),
    kpi('Lista de espera', e.lista_espera, 'purple'),
  ].join('');

  document.getElementById('cupoTxt').textContent = `${d.cupo.confirmados} / ${d.cupo.limite}`;
  document.getElementById('cupoBar').style.width = Math.min(100, d.cupo.confirmados/d.cupo.limite*100) + '%';
  document.getElementById('cupoSub').textContent = `${d.cupo.disponibles} cupos disponibles · facturas auto ${d.facturas.aprobada_auto} · manual ${d.facturas.aprobada_manual}`;

  document.getElementById('clientes').innerHTML = barlist(d.por_cliente.map(c=>({label:c.cliente, n:c.n}))) || vacio();
  document.getElementById('causas').innerHTML = barlist(d.causas_rechazo.map(c=>({label:CAUSA_LABEL[c.causa]||c.causa, n:c.n}))) || vacio();
}

const kpi = (l,v,c)=>`<div class="kpi-card ${c}"><div class="kpi-label">${l}</div><div class="kpi-value">${v||0}</div></div>`;
function barlist(items){
  if(!items.length) return '';
  const max = Math.max(...items.map(i=>i.n), 1);
  return items.map(i=>`<div class="barrow"><div class="bl"><span>${i.label}</span><b>${i.n}</b></div><div class="bar"><span style="width:${i.n/max*100}%"></span></div></div>`).join('');
}
const vacio = ()=>'<div class="muted" style="font-size:.85rem">Sin datos aún</div>';

init();
</script>
</body>
</html>
