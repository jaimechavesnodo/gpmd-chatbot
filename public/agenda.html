<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <base href="/gpmd-chatbot/"/>
  <title>Agenda — GPMD 2026</title>
  <link rel="icon" href="assets/img/favicon.png"/>
  <link rel="stylesheet" href="assets/css/main.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-end;">
      <div>
        <h1>📅 Agenda de Turnos</h1>
        <p>Revisión tecno-mecánica — Julio 21 al 24, 2026</p>
      </div>
      <div id="adminActions" style="display:none;">
        <button class="btn btn-primary btn-sm" onclick="abrirManual()">+ Registro Manual</button>
      </div>
    </div>

    <div id="agendaGrid" class="agenda-grid">
      <div style="grid-column:1/-1;text-align:center;padding:2rem;color:#888;">Cargando agenda...</div>
    </div>
  </main>
</div>

<!-- Modal detalle de slot -->
<div class="modal-overlay" id="modalSlot">
  <div class="modal" style="max-width:520px;">
    <button class="modal-close" onclick="cerrarModal('modalSlot')">×</button>
    <h2>Detalle del Turno</h2>
    <div id="modalSlotContent"></div>
    <div id="btnLiberarWrap" style="margin-top:1rem;display:none;">
      <button class="btn btn-danger btn-sm" onclick="liberarSlot()">Liberar turno</button>
    </div>
  </div>
</div>

<!-- Modal registro manual -->
<div class="modal-overlay" id="modalManual">
  <div class="modal">
    <button class="modal-close" onclick="cerrarModal('modalManual')">×</button>
    <h2>Registro Manual de Turno</h2>
    <div class="form-group">
      <label class="form-label">Cédula o código del participante</label>
      <input class="form-control" id="buscarParticipante" placeholder="Buscar..."/>
      <button class="btn btn-secondary btn-sm" style="margin-top:.4rem;" onclick="buscarPart()">Buscar</button>
    </div>
    <div id="participanteInfo" style="display:none;background:#f5f5f5;padding:.75rem;border-radius:8px;margin-bottom:1rem;font-size:.85rem;"></div>
    <div class="form-group">
      <label class="form-label">Fecha</label>
      <select class="form-control" id="manualFecha">
        <option value="2026-07-21">Martes 21 de julio</option>
        <option value="2026-07-22">Miércoles 22 de julio</option>
        <option value="2026-07-23">Jueves 23 de julio</option>
        <option value="2026-07-24">Viernes 24 de julio</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Franja</label>
      <select class="form-control" id="manualFranja">
        <option value="AM">AM (08:00 – 12:00)</option>
        <option value="PM">PM (14:00 – 18:00)</option>
      </select>
    </div>
    <div id="slotsDisponibles" style="margin-bottom:1rem;"></div>
    <button class="btn btn-primary" onclick="confirmarManual()" id="btnConfirmarManual" disabled>Confirmar Turno</button>
  </div>
</div>

<script src="assets/js/auth.js"></script>
<script>
const DIAS = [
  { fecha:'2026-07-21', label:'Mar 21 Jul' },
  { fecha:'2026-07-22', label:'Mié 22 Jul' },
  { fecha:'2026-07-23', label:'Jue 23 Jul' },
  { fecha:'2026-07-24', label:'Vie 24 Jul' },
];

let currentUser, allSlots = [], slotSeleccionado = null, participanteSeleccionado = null;

async function init() {
  currentUser = requireRole(['admin','cliente']);
  if (!currentUser) return;
  renderSidebar('agenda');
  if (currentUser.rol === 'admin') document.getElementById('adminActions').style.display = 'block';
  await cargarAgenda();
}

async function cargarAgenda() {
  const res = await apiFetch('api/agenda');
  if (!res) return;
  allSlots = await res.json();
  renderAgenda();
}

function renderAgenda() {
  const grid = document.getElementById('agendaGrid');
  grid.innerHTML = DIAS.map(d => `
    <div class="agenda-dia">
      <div class="agenda-dia-header">${d.label}</div>
      ${renderFranja(d.fecha, 'AM')}
      ${renderFranja(d.fecha, 'PM')}
    </div>
  `).join('');
}

function renderFranja(fecha, franja) {
  const slots = allSlots.filter(s => s.fecha === fecha && s.franja === franja);
  const libres  = slots.filter(s => !s.participant).length;
  const ocupados = slots.filter(s =>  s.participant).length;

  const lista = slots.map(s => {
    if (s.participant) {
      return `<div class="slot-pill ocupado" onclick="verSlot('${s.id}')">
        🔴 ${s.participant.nombre_piloto?.split(' ')[0] || 'Piloto'} · ${s.participant.vehiculo_placa || ''}
      </div>`;
    }
    return `<div class="slot-pill libre">🟢 Disponible</div>`;
  }).join('');

  return `
    <div class="agenda-franja">
      <div class="agenda-franja-title">${franja} — ${franja==='AM'?'08:00–12:00':'14:00–18:00'}</div>
      ${lista}
      <div class="agenda-resumen">${libres} disponibles / ${slots.length} total</div>
    </div>
  `;
}

async function verSlot(id) {
  const res = await apiFetch(`api/agenda/${id}`);
  const slot = await res.json();
  slotSeleccionado = slot;

  const p = slot.participant || {};
  const fechaLabel = { '2026-07-21':'Martes 21','2026-07-22':'Miércoles 22','2026-07-23':'Jueves 23','2026-07-24':'Viernes 24' }[slot.fecha] || slot.fecha;

  document.getElementById('modalSlotContent').innerHTML = `
    <table style="width:100%;font-size:.85rem;border-collapse:collapse;">
      <tr><td style="padding:.3rem 0;color:#666;width:140px;">Turno</td><td><strong>${fechaLabel} de julio · ${slot.franja} (${slot.hora_inicio}–${slot.hora_fin})</strong></td></tr>
      <tr><td style="padding:.3rem 0;color:#666;">Código GPMD</td><td>${p.codigo_preregistro||'—'}</td></tr>
      <tr><td style="padding:.3rem 0;color:#666;">Piloto</td><td>${p.nombre_piloto||'—'}</td></tr>
      <tr><td style="padding:.3rem 0;color:#666;">Cédula</td><td>${p.cedula||'—'}</td></tr>
      <tr><td style="padding:.3rem 0;color:#666;">Celular</td><td>${p.phone||'—'}</td></tr>
      <tr><td style="padding:.3rem 0;color:#666;">Ciudad</td><td>${p.ciudad||'—'}</td></tr>
      <tr><td style="padding:.3rem 0;color:#666;">Copiloto</td><td>${p.nombre_copiloto||'—'}</td></tr>
      <tr><td style="padding:.3rem 0;color:#666;">Vehículo</td><td>${p.vehiculo_marca||''} ${p.vehiculo_modelo||''} · ${p.vehiculo_placa||'—'}</td></tr>
      <tr><td style="padding:.3rem 0;color:#666;">Estado</td><td><span class="badge ${estadoBadge(p.estado)}">${p.estado||'—'}</span></td></tr>
      <tr><td style="padding:.3rem 0;color:#666;">Reservado</td><td>${slot.reservado_at ? new Date(slot.reservado_at).toLocaleString('es-CO') : '—'}</td></tr>
    </table>
  `;

  document.getElementById('btnLiberarWrap').style.display = currentUser.rol === 'admin' ? 'block' : 'none';
  document.getElementById('modalSlot').classList.add('show');
}

async function liberarSlot() {
  if (!slotSeleccionado) return;
  if (!confirm('¿Liberar este turno? El participante perderá su cita.')) return;
  const res = await apiFetch(`api/agenda/${slotSeleccionado.id}/liberar`, { method: 'DELETE' });
  if (res?.ok) {
    showToast('Turno liberado', 'ok');
    cerrarModal('modalSlot');
    cargarAgenda();
  } else showToast('Error al liberar turno', 'error');
}

function abrirManual() {
  participanteSeleccionado = null;
  slotSeleccionado = null;
  document.getElementById('participanteInfo').style.display = 'none';
  document.getElementById('slotsDisponibles').innerHTML = '';
  document.getElementById('btnConfirmarManual').disabled = true;
  document.getElementById('buscarParticipante').value = '';
  document.getElementById('modalManual').classList.add('show');
}

async function buscarPart() {
  const q = document.getElementById('buscarParticipante').value.trim();
  if (!q) return;
  const slots = allSlots.filter(s => s.participant &&
    (s.participant.cedula === q || s.participant.codigo_preregistro === q || s.participant.phone.includes(q)));

  if (slots.length) {
    const p = slots[0].participant;
    mostrarParticipante(p);
  } else {
    // buscar vía API por cédula/codigo
    const res = await apiFetch(`api/agenda?buscar=${encodeURIComponent(q)}`);
    const data = await res?.json();
    if (data && data.length && data[0].participant) mostrarParticipante(data[0].participant);
    else document.getElementById('participanteInfo').innerHTML = '<span style="color:#E30613">Participante no encontrado</span>';
    document.getElementById('participanteInfo').style.display = 'block';
  }
}

function mostrarParticipante(p) {
  participanteSeleccionado = p;
  document.getElementById('participanteInfo').innerHTML = `
    <strong>${p.nombre_piloto}</strong> · Cédula: ${p.cedula} · ${p.phone}
  `;
  document.getElementById('participanteInfo').style.display = 'block';
  mostrarSlotsDisponibles();
}

function mostrarSlotsDisponibles() {
  const fecha = document.getElementById('manualFecha').value;
  const franja = document.getElementById('manualFranja').value;
  const libres = allSlots.filter(s => s.fecha===fecha && s.franja===franja && !s.participant);
  if (!libres.length) {
    document.getElementById('slotsDisponibles').innerHTML = '<p style="color:#E30613;font-size:.85rem;">No hay slots disponibles en esta franja</p>';
    document.getElementById('btnConfirmarManual').disabled = true;
    return;
  }
  slotSeleccionado = libres[0]; // primer slot libre
  document.getElementById('slotsDisponibles').innerHTML = `<p style="font-size:.85rem;color:#166534;">✓ Slot disponible en ${franja} del ${fecha}</p>`;
  document.getElementById('btnConfirmarManual').disabled = !participanteSeleccionado;
}

async function confirmarManual() {
  if (!slotSeleccionado || !participanteSeleccionado) return;
  const res = await apiFetch('api/agenda/manual', {
    method: 'POST',
    body: JSON.stringify({ slot_id: slotSeleccionado.id, participant_id: participanteSeleccionado.id }),
  });
  if (res?.ok) {
    showToast('Turno registrado correctamente', 'ok');
    cerrarModal('modalManual');
    cargarAgenda();
  } else {
    const d = await res?.json();
    showToast(d?.error || 'Error al registrar', 'error');
  }
}

function cerrarModal(id) { document.getElementById(id).classList.remove('show'); }

function estadoBadge(e) {
  return { aprobado:'badge-verde', rechazado:'badge-rojo', en_registro:'badge-gris', factura_en_revision:'badge-amarillo' }[e] || 'badge-gris';
}

document.getElementById('manualFecha')?.addEventListener('change', () => participanteSeleccionado && mostrarSlotsDisponibles());
document.getElementById('manualFranja')?.addEventListener('change', () => participanteSeleccionado && mostrarSlotsDisponibles());

init();
</script>
</body>
</html>
