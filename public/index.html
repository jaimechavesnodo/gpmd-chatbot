<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <base href="/gpmd-chatbot/"/>
  <title>GPMD 2026 — Iniciar Sesión</title>
  <link rel="icon" href="assets/img/favicon.png"/>
  <link rel="stylesheet" href="assets/css/main.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="login-page">
  <div class="login-card">
    <img src="assets/img/Logo_MobilDelvac_v2.png" alt="Mobil Delvac" class="logo-mobil"/>
    <h1>Gran Premio Mobil Delvac 2026<br/>Panel Administrativo</h1>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="email">Correo electrónico</label>
        <input class="form-control" type="email" id="email" required autocomplete="email" placeholder="usuario@ejemplo.com"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input class="form-control" type="password" id="password" required autocomplete="current-password"/>
      </div>
      <p id="loginError" style="color:#E30613;font-size:.85rem;margin-bottom:.5rem;display:none;"></p>
      <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem;" type="submit" id="loginBtn">
        Ingresar
      </button>
    </form>

    <div style="margin-top:1.5rem;text-align:center;">
      <img src="assets/img/logo-nodo.png" alt="NODO" style="height:24px;opacity:.5;"/>
    </div>
  </div>

  <script>
    // Si ya hay sesión activa, redirigir
    const token = localStorage.getItem('gpmd_token');
    const user  = JSON.parse(localStorage.getItem('gpmd_user') || 'null');
    if (token && user) {
      const dest = user.rol === 'agente' ? 'aprobador.html' : 'agenda.html';
      window.location.href = dest;
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('loginError');
      btn.textContent = 'Ingresando...';
      btn.disabled = true;
      errEl.style.display = 'none';

      try {
        const res = await fetch('api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error al iniciar sesión');

        localStorage.setItem('gpmd_token', data.token);
        localStorage.setItem('gpmd_user', JSON.stringify(data.user));

        const dest = data.user.rol === 'agente' ? 'aprobador.html' : 'agenda.html';
        window.location.href = dest;
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.textContent = 'Ingresar';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
